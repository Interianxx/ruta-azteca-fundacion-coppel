version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare yarn@4.9.1 --activate
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
